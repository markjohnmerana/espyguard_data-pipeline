x-airflow-common: &airflow-common
  build: .
  env_file: .env
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Airflow's internal metadata database ──────────
  # Stores: DAG runs, task states, XCom values, logs
  # NOT your Supabase — this is Airflow's own DB
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  # ── One-time init: migrations + admin user ─────────
  # Runs once and exits — exit code 0 = success
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username  $$AIRFLOW_ADMIN_USER \
          --password $$AIRFLOW_ADMIN_PASSWORD \
          --firstname $$AIRFLOW_ADMIN_FIRSTNAME \
          --lastname $$AIRFLOW_ADMIN_LASTNAME \
          --role Admin \
          --email $$AIRFLOW_ADMIN_EMAIL
      "
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "airflow db check"]
      interval: 10s
      retries: 5
      start_period: 30s

  # ── Airflow UI ─────────────────────────────────────
  # Visit: http://localhost:8080
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully  # ← waits for init to finish

  # ── Airflow Scheduler ──────────────────────────────
  # Reads DAG files, triggers tasks on schedule
  # Runs continuously in the background
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully  # ← waits for init to finish

  # ── MinIO: S3-compatible object storage ───────────
  # API:     http://localhost:9000
  # Console: http://localhost:9001
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      retries: 3

volumes:
  postgres_data:
  minio_data: